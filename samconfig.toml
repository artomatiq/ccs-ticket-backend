version = 0.1

[default.global.parameters]
stack_name = "ccs-ticket-backend"
region = "us-east-1"

[default.build.parameters]
cached = true
parallel = true

[default.validate.parameters]
lint = true

[default.deploy.parameters]
region = "us-east-1"
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true
s3_prefix = "ccs-ticket-backend"
image_repositories = []
