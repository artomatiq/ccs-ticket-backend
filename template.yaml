AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
    Dump Truck Backend — event-driven ticket processing pipeline

Parameters:
    Stage:
        Type: String
        Default: dev
        AllowedValues: [dev, prod]
        Description: Deployment environment. Drives resource naming and SSM parameter paths.

Globals:
    Function:
        Runtime: nodejs22.x
        Architectures:
            - arm64
        Timeout: 30
        Tracing: Active
        LoggingConfig:
            LogFormat: JSON

Resources:
    Api:
        Type: AWS::Serverless::HttpApi
        Properties:
            Name: !Sub "dt-api-${Stage}"
            Auth:
                Authorizers:
                    JwtAuthorizer:
                        FunctionArn: !GetAtt JwtAuthorizer.Arn
                        Identity:
                            Headers:
                                - Authorization
                        AuthorizerPayloadFormatVersion: "2.0"
                        EnableSimpleResponses: true
                DefaultAuthorizer: JwtAuthorizer

    Login:
        Type: AWS::Serverless::Function
        Properties:
            FunctionName: !Sub "dt-login-${Stage}"
            CodeUri: src/
            Handler: handlers/dt-login/index.handler
            Environment:
                Variables:
                    JWT_SECRET_PARAM: !Sub "/dt/${Stage}/jwt-secret"
                    VV01_PASSCODE_PARAM: !Sub "/dt/${Stage}/passcode/vv01"
                    VV02_PASSCODE_PARAM: !Sub "/dt/${Stage}/passcode/vv02"
                    ADMIN_PASSCODE_PARAM: !Sub "/dt/${Stage}/passcode/admin"
            Policies:
                - Statement:
                      - Effect: Allow
                        Action:
                            - ssm:GetParameters
                        Resource:
                            - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/dt/${Stage}/jwt-secret
                            - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/dt/${Stage}/passcode/vv01
                            - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/dt/${Stage}/passcode/vv02
                            - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/dt/${Stage}/passcode/admin
                      - Effect: Allow
                        Action:
                            - kms:Decrypt
                        Resource: "*"
                        Condition:
                            StringEquals:
                                kms:ViaService: !Sub ssm.${AWS::Region}.amazonaws.com
            Events:
                LoginRoute:
                    Type: HttpApi
                    Properties:
                        ApiId: !Ref Api
                        Path: /login
                        Method: POST
                        Auth:
                            Authorizer: NONE
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                EntryPoints:
                    - handlers/dt-login/index.mjs
                Target: es2022
                Sourcemap: true
                External:
                    - "@aws-sdk/*"

    JwtAuthorizer:
        Type: AWS::Serverless::Function
        Properties:
            FunctionName: !Sub "dt-jwt-authorizer-${Stage}"
            CodeUri: src/
            Handler: handlers/dt-jwt-authorizer/index.handler
            Environment:
                Variables:
                    JWT_SECRET_PARAM: !Sub "/dt/${Stage}/jwt-secret"
            Policies:
                - Statement:
                      - Effect: Allow
                        Action:
                            - ssm:GetParameters
                        Resource:
                            - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/dt/${Stage}/jwt-secret
                      - Effect: Allow
                        Action:
                            - kms:Decrypt
                        Resource: "*"
                        Condition:
                            StringEquals:
                                kms:ViaService: !Sub ssm.${AWS::Region}.amazonaws.com
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                EntryPoints:
                    - handlers/dt-jwt-authorizer/index.mjs
                Target: es2022
                Sourcemap: true
                External:
                    - "@aws-sdk/*"

    JwtAuthorizerInvokePermission:
        Type: AWS::Lambda::Permission
        Properties:
            Action: lambda:InvokeFunction
            FunctionName: !GetAtt JwtAuthorizer.Arn
            Principal: apigateway.amazonaws.com
            SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/authorizers/*"

    TicketPresign:
        Type: AWS::Serverless::Function
        Properties:
            FunctionName: !Sub "dt-ticket-presign-${Stage}"
            CodeUri: src/
            Handler: handlers/dt-ticket-presign/index.handler
            Environment:
                Variables:
                    TICKET_TABLE: !Sub "dt-tickets-${Stage}"
                    TICKET_BUCKET: !Sub "dt-ticket-images-${Stage}-${AWS::AccountId}"
            Policies:
                - DynamoDBWritePolicy:
                      TableName: !Ref TicketTable
                - S3WritePolicy:
                      BucketName: !Ref TicketBucket
            Events:
                CreateTicket:
                    Type: HttpApi
                    Properties:
                        ApiId: !Ref Api
                        Path: /tickets
                        Method: POST
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                EntryPoints:
                    - handlers/dt-ticket-presign/index.mjs
                Target: es2022
                Sourcemap: true
                External:
                    - "@aws-sdk/*"

    TicketDbWriter:
        Type: AWS::Serverless::Function
        Properties:
            FunctionName: !Sub "dt-ticket-db-writer-${Stage}"
            CodeUri: src/
            Handler: handlers/dt-ticket-db-writer/index.handler
            Environment:
                Variables:
                    TICKET_TABLE: !Sub "dt-tickets-${Stage}"
                    EVENT_BUS_NAME: !Sub "dt-ticket-events-${Stage}"
            Policies:
                - DynamoDBCrudPolicy:
                      TableName: !Ref TicketTable
                - EventBridgePutEventsPolicy:
                      EventBusName: !Ref TicketEventBus
            Events:
                RawUpload:
                    Type: S3
                    Properties:
                        Bucket: !Ref TicketBucket
                        Events: s3:ObjectCreated:*
                        Filter:
                            S3Key:
                                Rules:
                                    - Name: prefix
                                      Value: raw/
                                    - Name: suffix
                                      Value: .jpg
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                EntryPoints:
                    - handlers/dt-ticket-db-writer/index.mjs
                Target: es2022
                Sourcemap: true
                External:
                    - "@aws-sdk/*"

    TicketValidator:
        Type: AWS::Serverless::Function
        Properties:
            FunctionName: !Sub "dt-ticket-validator-${Stage}"
            CodeUri: src/
            Handler: handlers/dt-ticket-validator/index.handler
            MemorySize: 512
            Timeout: 60
            Environment:
                Variables:
                    TICKET_TABLE: !Sub "dt-tickets-${Stage}"
                    TICKET_NUMBER_TABLE: !Sub "dt-ticket-numbers-${Stage}"
                    TICKET_BUCKET: !Sub "dt-ticket-images-${Stage}-${AWS::AccountId}"
                    EVENT_BUS_NAME: !Sub "dt-ticket-events-${Stage}"
            Policies:
                - DynamoDBCrudPolicy:
                      TableName: !Ref TicketTable
                - DynamoDBCrudPolicy:
                      TableName: !Ref TicketNumberTable
                - S3CrudPolicy:
                      BucketName: !Ref TicketBucket
                - EventBridgePutEventsPolicy:
                      EventBusName: !Ref TicketEventBus
                - Statement:
                      - Effect: Allow
                        Action: textract:DetectDocumentText
                        Resource: "*"
            Layers:
                - !Ref SharpLayer
            Events:
                TicketUploaded:
                    Type: EventBridgeRule
                    Properties:
                        EventBusName: !Ref TicketEventBus
                        Pattern:
                            source:
                                - dt.ticket
                            detail-type:
                                - TicketUploaded
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                EntryPoints:
                    - handlers/dt-ticket-validator/index.mjs
                Target: es2022
                Sourcemap: true
                External:
                    - "@aws-sdk/*"
                    - sharp

    TicketTextract:
        Type: AWS::Serverless::Function
        Properties:
            FunctionName: !Sub "dt-ticket-textract-${Stage}"
            CodeUri: src/
            Handler: handlers/dt-ticket-textract/index.handler
            MemorySize: 1024
            Timeout: 60
            Environment:
                Variables:
                    TICKET_TABLE: !Sub "dt-tickets-${Stage}"
            Policies:
                - DynamoDBCrudPolicy:
                      TableName: !Ref TicketTable
                - S3ReadPolicy:
                      BucketName: !Ref TicketBucket
                - Statement:
                      - Effect: Allow
                        Action: textract:AnalyzeDocument
                        Resource: "*"
            Events:
                TicketValidated:
                    Type: EventBridgeRule
                    Properties:
                        EventBusName: !Ref TicketEventBus
                        Pattern:
                            source:
                                - dt.ticket
                            detail-type:
                                - TicketValidated
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                EntryPoints:
                    - handlers/dt-ticket-textract/index.mjs
                Target: es2022
                Sourcemap: true
                External:
                    - "@aws-sdk/*"

    TicketDbReader:
        Type: AWS::Serverless::Function
        Properties:
            FunctionName: !Sub "dt-ticket-db-reader-${Stage}"
            CodeUri: src/
            Handler: handlers/dt-ticket-db-reader/index.handler
            Environment:
                Variables:
                    TICKET_TABLE: !Sub "dt-tickets-${Stage}"
                    TICKET_BUCKET: !Sub "dt-ticket-images-${Stage}-${AWS::AccountId}"
            Policies:
                - DynamoDBReadPolicy:
                      TableName: !Ref TicketTable
                - S3ReadPolicy:
                      BucketName: !Ref TicketBucket
            Events:
                GetOne:
                    Type: HttpApi
                    Properties:
                        ApiId: !Ref Api
                        Path: /tickets/{ticketId}
                        Method: GET
                List:
                    Type: HttpApi
                    Properties:
                        ApiId: !Ref Api
                        Path: /tickets
                        Method: GET
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                EntryPoints:
                    - handlers/dt-ticket-db-reader/index.mjs
                Target: es2022
                Sourcemap: true
                External:
                    - "@aws-sdk/*"

    TicketDbConfirm:
        Type: AWS::Serverless::Function
        Properties:
            FunctionName: !Sub "dt-ticket-db-confirm-${Stage}"
            CodeUri: src/
            Handler: handlers/dt-ticket-db-confirm/index.handler
            Environment:
                Variables:
                    TICKET_TABLE: !Sub "dt-tickets-${Stage}"
                    TICKET_NUMBER_TABLE: !Sub "dt-ticket-numbers-${Stage}"
                    EVENT_BUS_NAME: !Sub "dt-ticket-events-${Stage}"
            Policies:
                - DynamoDBCrudPolicy:
                      TableName: !Ref TicketTable
                - DynamoDBCrudPolicy:
                      TableName: !Ref TicketNumberTable
                - EventBridgePutEventsPolicy:
                      EventBusName: !Ref TicketEventBus
            Events:
                Confirm:
                    Type: HttpApi
                    Properties:
                        ApiId: !Ref Api
                        Path: /tickets/{ticketId}/confirm
                        Method: POST
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                EntryPoints:
                    - handlers/dt-ticket-db-confirm/index.mjs
                Target: es2022
                Sourcemap: true
                External:
                    - "@aws-sdk/*"

    SheetsWriter:
        Type: AWS::Serverless::Function
        Properties:
            FunctionName: !Sub "dt-sheets-writer-${Stage}"
            CodeUri: src/
            Handler: handlers/dt-sheets-writer/index.handler
            Timeout: 60
            Environment:
                Variables:
                    TICKET_TABLE: !Sub "dt-tickets-${Stage}"
                    TICKET_NUMBER_TABLE: !Sub "dt-ticket-numbers-${Stage}"
                    TICKET_BUCKET: !Sub "dt-ticket-images-${Stage}-${AWS::AccountId}"
                    EVENT_BUS_NAME: !Sub "dt-ticket-events-${Stage}"
                    SPREADSHEET_ID_PARAM: !Sub "/dt/${Stage}/sheets/spreadsheet-id"
                    SHEET_NAME: Invoice_Spreadsheet
                    RATE: "105"
                    GOOGLE_SA_SECRET: dt-ticket/google-sa
            Layers:
                - !Ref GoogleApiLayer
            Policies:
                - DynamoDBCrudPolicy:
                      TableName: !Ref TicketTable
                - DynamoDBCrudPolicy:
                      TableName: !Ref TicketNumberTable
                - EventBridgePutEventsPolicy:
                      EventBusName: !Ref TicketEventBus
                - Statement:
                      - Effect: Allow
                        Action:
                            - ssm:GetParameters
                        Resource:
                            - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/dt/${Stage}/sheets/spreadsheet-id
                      - Effect: Allow
                        Action:
                            - secretsmanager:GetSecretValue
                        Resource:
                            - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:dt-ticket/google-sa-*
            Events:
                TicketConfirmed:
                    Type: EventBridgeRule
                    Properties:
                        EventBusName: !Ref TicketEventBus
                        Pattern:
                            source:
                                - dt.ticket
                            detail-type:
                                - TicketConfirmed
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                EntryPoints:
                    - handlers/dt-sheets-writer/index.mjs
                Target: es2022
                Sourcemap: true
                External:
                    - "@aws-sdk/*"
                    - "googleapis"

    InvoiceGenerator:
        Type: AWS::Serverless::Function
        Properties:
            FunctionName: !Sub "dt-invoice-generator-${Stage}"
            CodeUri: src/
            Handler: handlers/dt-invoice-generator/index.handler
            Timeout: 60
            Environment:
                Variables:
                    TICKET_TABLE: !Sub "dt-tickets-${Stage}"
                    APPS_SCRIPT_URL_PARAM: !Sub "/dt/${Stage}/apps-script-url"
            Policies:
                - DynamoDBCrudPolicy:
                      TableName: !Ref TicketTable
                - Statement:
                      - Effect: Allow
                        Action:
                            - ssm:GetParameters
                        Resource:
                            - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/dt/${Stage}/apps-script-url
                      - Effect: Allow
                        Action:
                            - kms:Decrypt
                        Resource: "*"
                        Condition:
                            StringEquals:
                                kms:ViaService: !Sub ssm.${AWS::Region}.amazonaws.com
            Events:
                Generate:
                    Type: HttpApi
                    Properties:
                        ApiId: !Ref Api
                        Path: /invoices
                        Method: POST
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                EntryPoints:
                    - handlers/dt-invoice-generator/index.mjs
                Target: es2022
                Sourcemap: true
                External:
                    - "@aws-sdk/*"

    # ── Stateful ──────────────────────────────────────────────

    TicketTable:
        Type: AWS::DynamoDB::Table
        DeletionPolicy: Retain
        UpdateReplacePolicy: Retain
        Properties:
            TableName: !Sub "dt-tickets-${Stage}"
            BillingMode: PAY_PER_REQUEST
            SSESpecification:
                SSEEnabled: true
            AttributeDefinitions:
                - AttributeName: ticketId
                  AttributeType: S
                - AttributeName: status
                  AttributeType: S
                - AttributeName: ticketDate
                  AttributeType: S
            KeySchema:
                - AttributeName: ticketId
                  KeyType: HASH
            GlobalSecondaryIndexes:
                - IndexName: status-ticketDate-index
                  KeySchema:
                      - AttributeName: status
                        KeyType: HASH
                      - AttributeName: ticketDate
                        KeyType: RANGE
                  Projection:
                      ProjectionType: ALL
            PointInTimeRecoverySpecification:
                PointInTimeRecoveryEnabled: true

    TicketNumberTable:
        Type: AWS::DynamoDB::Table
        DeletionPolicy: Retain
        UpdateReplacePolicy: Retain
        Properties:
            TableName: !Sub "dt-ticket-numbers-${Stage}"
            BillingMode: PAY_PER_REQUEST
            SSESpecification:
                SSEEnabled: true
            AttributeDefinitions:
                - AttributeName: ticketNumber
                  AttributeType: S
            KeySchema:
                - AttributeName: ticketNumber
                  KeyType: HASH
            PointInTimeRecoverySpecification:
                PointInTimeRecoveryEnabled: true

    TicketBucket:
        Type: AWS::S3::Bucket
        Metadata:
            guard:
                SuppressedRules:
                    - S3_BUCKET_LOGGING_ENABLED
        DeletionPolicy: Retain
        UpdateReplacePolicy: Retain
        Properties:
            BucketName: !Sub "dt-ticket-images-${Stage}-${AWS::AccountId}"
            PublicAccessBlockConfiguration:
                BlockPublicAcls: true
                BlockPublicPolicy: false
                IgnorePublicAcls: true
                RestrictPublicBuckets: false
            BucketEncryption:
                ServerSideEncryptionConfiguration:
                    - ServerSideEncryptionByDefault:
                          SSEAlgorithm: AES256
            VersioningConfiguration:
                Status: Enabled
            LifecycleConfiguration:
                Rules:
                    - Id: expire-old-versions
                      Status: Enabled
                      NoncurrentVersionExpirationInDays: 30
            CorsConfiguration:
                CorsRules:
                    - AllowedMethods: [PUT, GET]
                      AllowedOrigins: ["*"]
                      AllowedHeaders: ["*"]
                      MaxAge: 3000

    TicketBucketPolicy:
        Type: AWS::S3::BucketPolicy
        Properties:
            Bucket: !Ref TicketBucket
            PolicyDocument:
                Version: "2012-10-17"
                Statement:
                    - Sid: PublicReadValidatedTickets
                      Effect: Allow
                      Principal: "*"
                      Action: s3:GetObject
                      Resource: !Sub "arn:aws:s3:::${TicketBucket}/validated/*"

    TicketEventBus:
        Type: AWS::Events::EventBus
        Properties:
            Name: !Sub "dt-ticket-events-${Stage}"

    # ── Layers ────────────────────────────────────────────────

    GoogleApiLayer:
        Type: AWS::Serverless::LayerVersion
        Properties:
            LayerName: !Sub "dt-google-api-layer-${Stage}"
            Description: googleapis SDK for Node.js handlers
            ContentUri: layers/dt-google-api/
            CompatibleRuntimes:
                - nodejs22.x
            CompatibleArchitectures:
                - arm64
            RetentionPolicy: Delete
        Metadata:
            BuildMethod: nodejs22.x
            BuildArchitecture: arm64

    SharpLayer:
        Type: AWS::Serverless::LayerVersion
        Properties:
            LayerName: !Sub "dt-sharp-layer-${Stage}"
            Description: sharp image processing library for Node.js handlers
            ContentUri: layers/dt-sharp/
            CompatibleRuntimes:
                - nodejs22.x
            CompatibleArchitectures:
                - arm64
            RetentionPolicy: Delete
        Metadata:
            BuildMethod: nodejs22.x
            BuildArchitecture: arm64

Outputs:
    ApiUrl:
        Description: HTTP API base URL
        Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com"

