AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  CCS Ticket Backend — event-driven ticket processing pipeline

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures:
      - arm64
    Timeout: 30
    Tracing: Active
    LoggingConfig:
      LogFormat: JSON

Resources:
  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      Name: dt-api
      Auth:
        Authorizers:
          JwtAuthorizer:
            FunctionArn: !GetAtt JwtAuthorizer.Arn
            Identity:
              Headers:
                - Authorization
            AuthorizerPayloadFormatVersion: "2.0"
            EnableSimpleResponses: true
        DefaultAuthorizer: JwtAuthorizer

  Login:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: dt-login
      CodeUri: src/
      Handler: handlers/dt-login/index.handler
      Environment:
        Variables:
          JWT_SECRET_PARAM: /dt/jwt-secret
          VV01_PASSCODE_PARAM: /dt/passcode/vv01
          VV02_PASSCODE_PARAM: /dt/passcode/vv02
          ADMIN_PASSCODE_PARAM: /dt/passcode/admin
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameters
              Resource:
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/dt/jwt-secret
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/dt/passcode/vv01
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/dt/passcode/vv02
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/dt/passcode/admin
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: '*'
              Condition:
                StringEquals:
                  kms:ViaService: !Sub ssm.${AWS::Region}.amazonaws.com
      Events:
        LoginRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /login
            Method: POST
            Auth:
              Authorizer: NONE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - handlers/dt-login/index.mjs
        Target: es2022
        Sourcemap: true
        External:
          - '@aws-sdk/*'

  JwtAuthorizer:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: dt-jwt-authorizer
      CodeUri: src/
      Handler: handlers/dt-jwt-authorizer/index.handler
      Environment:
        Variables:
          JWT_SECRET_PARAM: /dt/jwt-secret
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameters
              Resource:
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/dt/jwt-secret
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: '*'
              Condition:
                StringEquals:
                  kms:ViaService: !Sub ssm.${AWS::Region}.amazonaws.com
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - handlers/dt-jwt-authorizer/index.mjs
        Target: es2022
        Sourcemap: true
        External:
          - '@aws-sdk/*'
